<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Aus Plant Phenology</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>

<div class="container">
    
    <header>
        <h1>🌿 Aus Plant Phenology</h1>
        <p class="subtitle">Conservation tool</p>
    </header>
    
    <!-- Simple loading indicator -->
    <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <span id="loadingText">Loading...</span>
    </div>
    
    <!-- Simple error message -->
    <div id="errorMsg" class="error-box" style="display: none;"></div>
    
    <!-- Filters - Collapsible on mobile -->
    <div class="card">
        <div class="filter-header" onclick="toggleFilters()">
            <h3>🔍 Filters</h3>
            <span id="filterToggle">▼</span>
        </div>
        
        <div id="filterContent" class="filter-content">
            <div class="filter-group">
                <label>State</label>
                <select id="stateFilter" onchange="applyFilters()">
                    <option value="">All</option>
                    <option value="NSW">NSW</option>
                    <option value="VIC">VIC</option>
                    <option value="QLD">QLD</option>
                    <option value="SA">SA</option>
                    <option value="WA">WA</option>
                    <option value="TAS">TAS</option>
                    <option value="NT">NT</option>
                    <option value="ACT">ACT</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>Flowering</label>
                <select id="flowerMonth" onchange="applyFilters()">
                    <option value="">Any</option>
                    <option value="Jan">Jan</option><option value="Feb">Feb</option>
                    <option value="Mar">Mar</option><option value="Apr">Apr</option>
                    <option value="May">May</option><option value="Jun">Jun</option>
                    <option value="Jul">Jul</option><option value="Aug">Aug</option>
                    <option value="Sep">Sep</option><option value="Oct">Oct</option>
                    <option value="Nov">Nov</option><option value="Dec">Dec</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>Seed</label>
                <select id="seedMonth" onchange="applyFilters()">
                    <option value="">Any</option>
                    <option value="Jan">Jan</option><option value="Feb">Feb</option>
                    <option value="Mar">Mar</option><option value="Apr">Apr</option>
                    <option value="May">May</option><option value="Jun">Jun</option>
                    <option value="Jul">Jul</option><option value="Aug">Aug</option>
                    <option value="Sep">Sep</option><option value="Oct">Oct</option>
                    <option value="Nov">Nov</option><option value="Dec">Dec</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>Family</label>
                <select id="familyFilter" onchange="applyFilters()">
                    <option value="">All</option>
                </select>
            </div>
            
            <div class="filter-checkbox">
                <label>
                    <input type="checkbox" id="bothDataFilter" onchange="applyFilters()">
                    Both flowering & seed
                </label>
            </div>
            
            <div class="filter-actions">
                <input type="text" id="searchInput" placeholder="🔍 Search species..." onkeyup="applyFilters()">
                <button onclick="clearFilters()" class="btn-small">Clear</button>
            </div>
        </div>
    </div>
    
    <!-- Dataset selector - Simplified -->
    <div class="card dataset-card">
        <select id="datasetSelect" class="dataset-select">
            <option value="aus_native_phenology_complete.csv">Complete</option>
            <option value="sample_phenology_data.csv">Sample</option>
        </select>
        <button onclick="changeDataset()" class="btn-small">Load</button>
    </div>
    
    <!-- Stats bar -->
    <div class="stats-bar">
        <span>Species: <strong id="speciesCount">0</strong></span>
        <span>
            <select id="chartMode" onchange="updateCharts()" class="chart-mode-select">
                <option value="total">Count</option>
                <option value="percent">%</option>
            </select>
        </span>
    </div>
    
    <!-- Charts - Simplified -->
    <div class="charts-row">
        <div class="chart-mini">
            <h4>🌸 Flowering</h4>
            <canvas id="flowerChart"></canvas>
        </div>
        <div class="chart-mini">
            <h4>🌱 Seed</h4>
            <canvas id="seedChart"></canvas>
        </div>
    </div>
    
    <!-- Species list - Simplified table -->
    <div class="card">
        <h3>📋 Species <span id="resultCount" class="count-badge">0</span></h3>
        
        <div class="species-list" id="speciesList">
            <!-- Will be populated by JavaScript -->
        </div>
    </div>
    
</div>

<script src="app.js"></script>
</body>
</html>
